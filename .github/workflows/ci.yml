name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, phase-d ]
  pull_request:
    branches: [ main, develop ]

env:
  PYTHON_VERSION: "3.11"
  JWT_SECRET_KEY: ci-test-secret-key

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install ruff mypy

    - name: Lint with ruff
      run: ruff check app/ tests/

    - name: Check formatting with ruff
      run: ruff format --check app/ tests/

    - name: Type check with mypy
      run: mypy app/

  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Run unit tests with coverage
      run: pytest tests/unit/ --cov=app --cov-report=term-missing --cov-fail-under=80 -v

    - name: Run integration tests
      run: pytest tests/integration/ -v

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Audit Python dependencies
      run: pip-audit --strict --progress-spinner=off

    - name: Run bandit security linter
      run: pip install bandit && bandit -r app/ -c pyproject.toml || true

  docker:
    needs: [lint, test, security]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build -t ai-agent-system:ci-${{ github.sha }} .

    - name: Verify image size < 2 GB
      run: |
        SIZE=$(docker images ai-agent-system:ci-${{ github.sha }} --format "{{.Size}}" | sed 's/GB//;s/MB//')
        echo "Image size: $SIZE"
        # Accept either GB or MB format
        if echo "$SIZE" | grep -q "GB"; then
          SIZE_NUM=$(echo "$SIZE" | sed 's/GB//')
          if [ "$(echo "$SIZE_NUM > 2" | bc)" -eq 1 ]; then
            echo "Image exceeds 2 GB limit!"
            exit 1
          fi
        fi
        echo "Image size OK"

    - name: Quick smoke test
      run: |
        docker run -d --name smoke-test \
          -e JWT_SECRET_KEY=ci-test-secret-key \
          -p 8000:8000 \
          ai-agent-system:ci-${{ github.sha }}
        sleep 5
        curl -sf http://localhost:8000/health | python -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='healthy'; print('Health OK')"
        curl -sf http://localhost:8000/readyz | python -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='ready'; print('Readyz OK')"
        docker stop smoke-test
        docker rm smoke-test
